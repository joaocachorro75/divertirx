version: '3.8'

services:
  divertirx:
    build: .
    container_name: divertirx
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # APIs
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ONPIX_PROXY=${ONPIX_PROXY:-5.161.155.252:80}
      - ONPIX_USERNAME=${ONPIX_USERNAME}
      - ONPIX_PASSWORD=${ONPIX_PASSWORD}
      - SERVEX_API_KEY=${SERVEX_API_KEY}
    volumes:
      - ./database:/app/database
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
